services:
  db:
    image: postgis/postgis:16-3.4
    container_name: argos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-argos}
    volumes:
      - argos_db_data:/var/lib/postgresql/data
    # Bind to localhost only; never expose 5432 publicly without a proxy + auth.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argos}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: argos-app
    restart: unless-stopped
    user: "1000:1000"
    init: true
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-argos}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-argos}
      NODE_ENV: ${NODE_ENV:-development}
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      JWT_ISSUER: ${JWT_ISSUER:-argos}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-argos}
      JWT_KID: ${JWT_KID:-v1}
      COOKIES_SECURE: ${COOKIES_SECURE:-false}
      PGSSL: ${PGSSL:-}
      PLATFORM_DEFAULT_LOCALE: ${PLATFORM_DEFAULT_LOCALE:-en}
      MAP_DEFAULT_CENTER_LON: ${MAP_DEFAULT_CENTER_LON:-33.6694}
      MAP_DEFAULT_CENTER_LAT: ${MAP_DEFAULT_CENTER_LAT:-34.9787}
      MAP_DEFAULT_ZOOM: ${MAP_DEFAULT_ZOOM:-12}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-0}
      # pnpm content-addressed cache lives on its own named volume, never in /app.
      npm_config_store_dir: /pnpm-store
    volumes:
      - .:/app
      - argos_node_modules:/app/node_modules
      - argos_pnpm_store:/pnpm-store
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/api/health | grep -q '\"ok\":true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    # `--prefer-frozen-lockfile` honors the lockfile when it matches and
    # rewrites it when devs add/remove deps. CI should use `--frozen-lockfile`.
    command: sh -c "pnpm install --prefer-frozen-lockfile && pnpm dev"

volumes:
  argos_db_data:
  argos_node_modules:
  argos_pnpm_store:
