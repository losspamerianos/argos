services:
  db:
    image: postgis/postgis:16-3.4
    container_name: argos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-argos}
    volumes:
      - argos_db_data:/var/lib/postgresql/data
    # Bind to localhost only; never expose 5432 publicly without a proxy + auth.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      # `-d` ensures we wait for the named DB to be reachable, not just the
      # postmaster. Migrations creating extensions otherwise race a "ready"
      # postmaster.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argos} -d ${POSTGRES_DB:-argos}"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: argos-app
    restart: unless-stopped
    user: "1000:1000"
    init: true
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-argos}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-argos}
      NODE_ENV: ${NODE_ENV:-development}
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      JWT_ISSUER: ${JWT_ISSUER:-argos}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-argos}
      JWT_KID: ${JWT_KID:-v1}
      COOKIES_SECURE: ${COOKIES_SECURE:-false}
      PGSSL: ${PGSSL:-}
      PLATFORM_DEFAULT_LOCALE: ${PLATFORM_DEFAULT_LOCALE:-en}
      MAP_DEFAULT_CENTER_LON: ${MAP_DEFAULT_CENTER_LON:-33.6694}
      MAP_DEFAULT_CENTER_LAT: ${MAP_DEFAULT_CENTER_LAT:-34.9787}
      MAP_DEFAULT_ZOOM: ${MAP_DEFAULT_ZOOM:-12}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-0}
      # Behind the caddy reverse-proxy: the public origin and the directive to
      # trust X-Forwarded-Proto in the hooks Origin check.
      ORIGIN: ${ARGOS_PUBLIC_ORIGIN:-http://localhost:5173}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
      # pnpm content-addressed cache lives on its own named volume, never in /app.
      npm_config_store_dir: /pnpm-store
    volumes:
      - .:/app
      - argos_node_modules:/app/node_modules
      - argos_pnpm_store:/pnpm-store
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 not localhost: the alpine resolver gives us ::1 first, which
      # vite's `--host 0.0.0.0` (IPv4-only) does not bind, so localhost would
      # leave the container marked "unhealthy" forever.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/api/health | grep -q '\"ok\":true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # `--prefer-frozen-lockfile` honors the lockfile when it matches and
    # rewrites it when devs add/remove deps. CI should use `--frozen-lockfile`.
    command: sh -c "pnpm install --prefer-frozen-lockfile && pnpm dev"

  # Edge — TLS terminator + Basic Auth in front of the Vite dev server. Only
  # spun up by the `edge` profile so a vanilla `docker compose up` does not
  # touch ports 80/443. Run with `docker compose --profile edge up -d caddy`.
  caddy:
    image: caddy:2-alpine
    container_name: argos-caddy
    profiles: [edge]
    restart: unless-stopped
    environment:
      # Bcrypt hash of the cleartext password; Caddy reads via {env.…} in the
      # Caddyfile. Set CADDY_BASIC_AUTH_HASH in `.env`.
      CADDY_BASIC_AUTH_HASH: ${CADDY_BASIC_AUTH_HASH:?CADDY_BASIC_AUTH_HASH must be set}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    security_opt:
      - no-new-privileges:true

volumes:
  argos_db_data:
  argos_node_modules:
  argos_pnpm_store:
  caddy_data:
  caddy_config:
